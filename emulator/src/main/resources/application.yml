spring:
  application:
    name: pickcar-emulator
  profiles:
    active: local
  data:
    redis:
      host: pickcar-redis
      port: 6379
  rabbitmq:
    host: rabbitmq
    port: 5672
    template:
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 5
        multiplier: 2.0

mq:
  cycle:
    exchange: exchange-cycle
    routing-key: cycle.key
    queue: cycle-queue-sse


logging:
  module-name: consumer
  sensitive-field-rules:
    - path: "none"
      fields: ["none"]