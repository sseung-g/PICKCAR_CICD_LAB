version: '3.8'

services:
  loki:
    image: grafana/loki:2.9.14
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./loki-data/wal:/wal            # <- 추가
      - ./loki-data:/loki           # Loki 데이터 디렉토리 (index, chunks, etc.)
      - C:/Users/seomoon/Desktop/KBE5_PICKCAR_BE/domain/src/main/resources/loki-config.yml:/etc/loki/config.yml

  promtail:
    image: grafana/promtail:2.8.2
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - C:/Users/seomoon/Desktop/KBE5_PICKCAR_BE/domain/src/main/resources/promtail-config.yml:/etc/promtail/config.yml
      - C:/Users/seomoon/Desktop/KBE5_PICKCAR_BE/logs:/var/log/myapp   # 로그 디렉토리 마운트
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - loki

volumes:
  grafana-storage:
