# 인증 기능 비활성화 (프로덕션에서는 OAuth/Grafana 인증 등 별도 보안 설정을 권장)
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

distributor:      # 수신한 로그를 ingester로 분배
  ring:
    kvstore:
      store: inmemory

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 5m     # 청크가 5분뒤 디스크로 flush 됨
  chunk_retain_period: 30s  # 청크 재로딩시 30초 유지
  max_chunk_age: 1h         # 청크당 최대 수명 (1시간)
  chunk_target_size: 1048576  # 청크 크기 - 1MB

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index   # 로컬에서 인덱스를 생성하는 디렉토리 경로 (컨테이너 내 경로)
    cache_location: /loki/boltdb-cache    # 인덱스 조회 성능 향상을 위해 로컬에 캐시 저장 (컨테이너 내 경로)
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

compactor:    # 인덱스 압축 및 정리 작업
  working_directory: /loki/compactor
  compaction_interval: 10m    # 10분마다 오래된 인덱스 압축 (디스크 사용량 절감)

limits_config:
  enforce_metric_name: false
  max_streams_per_user: 0
  max_global_streams_per_user: 0
  retention_period: 336h    # 로그 보관 기간: 14일(336시간) 후 삭제

chunk_store_config:
  max_look_back_period: 0s  # 과거 조회 기간 제한없음

table_manager:
  retention_deletes_enabled: true  # 보관 기간이 지난 인덱스(테이블) 자동 삭제 활성화
  retention_period: 336h # 14일 후 삭제

# NOTE: 기타 알림 설정 (프로메테우스)