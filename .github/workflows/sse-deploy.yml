name: Build and Deploy SSE Service

on:
  push:
    branches:
      - dev

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      #gradlew 스크립트에 실행 권한을 줘서 Gradle 빌드 가능하도록 설정
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build domain JAR
        run: ./gradlew :emulator:clean :emulator:build --stacktrace

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          debug: true
          host: ${{ secrets.SSE_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          source: emulator/build/libs/emulator-0.0.1-SNAPSHOT.jar
          target: /home/${{ secrets.EC2_USERNAME }}/pickcar-sse-test/
          strip_components: 3  # 모듈/build/libs 제거

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          debug: true
          host: ${{ secrets.SSE_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          source: docker/docker-compose.sse.yml
          target: /home/${{ secrets.EC2_USERNAME }}/pickcar-sse-test/
          strip_components: 1  # docker 제거

      - name: SSH into EC2 and deploy with docker-compose
        uses: appleboy/ssh-action@v0.1.7
        with:
          debug: true
          host: ${{ secrets.SSE_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/pickcar-sse-test      
            cat > .env <<EOF
            EC2_USERNAME=${{ secrets.EC2_USERNAME }}
            
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            
            RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
            RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT }}
            RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            
            SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DB_HOST }}:${{ secrets.DB_PORT }}/${{ secrets.DB_NAME }}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
            
            HOSTNAME=${{ secrets.HOSTNAME_SSE }}
            EC2_INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID_SSE }}
            
            PINPOINT_AGENT_ID=${{ secrets.PINPOINT_AGENT_ID_SSE }}
            PINPOINT_APPLICATION_NAME=${{ secrets.PINPOINT_APPLICATION_NAME_SSE }}
            EOF
            
            echo "${{ secrets.PROD_APPLICATION_YML_SSE }}" | base64 -d > /home/${{ secrets.EC2_USERNAME }}/pickcar-sse-test/application-prod.yml
            
            docker compose -f docker-compose.sse.yml down
            docker compose -f docker-compose.sse.yml up -d