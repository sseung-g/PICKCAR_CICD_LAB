name: Build and Deploy Domain Service

on:
  push:
    branches:
      - dev

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      #gradlew 스크립트에 실행 권한을 줘서 Gradle 빌드 가능하도록 설정
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build domain JAR
#        working-directory: ./domaindd
        run: ./gradlew :domain:clean :domain:build --stacktrace

      - name: Check built files
        run: ls -al docker/

      - name: Copy JAR and SNAPSHOT to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          debug: true
          host: ${{ secrets.DOMAIN_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          source: domain/build/libs/domain-0.0.1-SNAPSHOT.jar
          target: /home/ec2-user/pickcar-domain-test/
          strip_components: 3  # domain/build/libs 제거

      - name: Copy JAR and docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          debug: true
          host: ${{ secrets.DOMAIN_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          source: docker/docker-compose.domain.yml
          target: /home/ec2-user/pickcar-domain-test/
          strip_components: 1  # docker 제거

      - name: SSH into EC2 and deploy with docker-compose
        uses: appleboy/ssh-action@v0.1.7
        with:
          debug: true
          host: ${{ secrets.DOMAIN_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          script: |
            cd /home/ec2-user/pickcar-domain-test
            cat > .env <<EOF
            SPRING_PROFILES_ACTIVE=${{ secrets.SPRING_PROFILES_ACTIVE }}
            
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            
            RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
            RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT }}
            RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            
            SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DB_HOST }}:${{ secrets.DB_PORT }}/${{ secrets.DB_NAME }}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
  
            HOSTNAME=${{ secrets.HOSTNAME_DOMAIN }}
            EC2_INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID_DOMAIN }}
          
            PINPOINT_AGENT_ID=${{ secrets.PINPOINT_AGENT_ID_DOMAIN }}
            PINPOINT_APPLICATION_NAME=${{ secrets.PINPOINT_APPLICATION_NAME_DOMAIN }}
            EOF
            docker compose -f docker-compose.domain.yml down
            docker compose -f docker-compose.domain.yml up -d

#             필요시 .env 파일 생성/업데이트
#             echo "SPRING_DATASOURCE_URL=..." > .env
#            echo "This is a test3"
#            docker compose -f docker-compose.domain.yml down
#            docker compose -f docker-compose.domain.yml up -d --build