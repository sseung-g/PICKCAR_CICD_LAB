name: Build and Deploy PubSub Service

on:
  push:
    branches:
      - dev

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # gradlew 스크립트에 실행 권한을 줘서 Gradle 빌드 가능하도록 설정 d
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build consumer JAR
        run: ./gradlew :consumer:clean :consumer:build --stacktrace

      - name: Build producer JAR
        run: ./gradlew :producer:clean :producer:build --stacktrace

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          debug: true
          host: ${{ secrets.PUBSUB_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          source: consumer/build/libs/consumer-0.0.1-SNAPSHOT.jar
          target: /home/${{ secrets.EC2_USERNAME }}/pickcar-pubsub-test/
          strip_components: 3  # 모듈/build/libs 제거

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          debug: true
          host: ${{ secrets.PUBSUB_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          source: producer/build/libs/producer-0.0.1-SNAPSHOT.jar
          target: /home/${{ secrets.EC2_USERNAME }}/pickcar-pubsub-test/
          strip_components: 3  # 모듈/build/libs 제거

      - name: docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          debug: true
          host: ${{ secrets.PUBSUB_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          source: docker/docker-compose.pubsub.yml
          target: /home/${{ secrets.EC2_USERNAME }}/pickcar-pubsub-test/
          strip_components: 1  # docker 제거

      - name: SSH into EC2 and deploy with docker-compose
        uses: appleboy/ssh-action@v0.1.7
        with:
          debug: true
          host: ${{ secrets.PUBSUB_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/pickcar-pubsub-test
            cat > .env <<EOF
            EC2_USERNAME=${{ secrets.EC2_USERNAME }}
            
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            
            RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
            RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT }}
            RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            
            SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DB_HOST }}:${{ secrets.DB_PORT }}/${{ secrets.DB_NAME }}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
            
            HOSTNAME=${{ secrets.HOSTNAME_PUBSUB }}
            EC2_INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID_PUBSUB }}
            
            PINPOINT_AGENT_ID_PRODUCER=${{ secrets.PINPOINT_AGENT_ID_PRODUCER }}
            PINPOINT_APPLICATION_NAME_PRODUCER=${{ secrets.PINPOINT_APPLICATION_NAME_PRODUCER }}
            
            PINPOINT_AGENT_ID_CONSUMER=${{ secrets.PINPOINT_AGENT_ID_CONSUMER }}
            PINPOINT_APPLICATION_NAME_CONSUMER=${{ secrets.PINPOINT_APPLICATION_NAME_CONSUMER }}
            EOF
            
            echo "${{ secrets.PROD_APPLICATION_YML_CONSUMER }}" | base64 -d > /home/${{ secrets.EC2_USERNAME }}/pickcar-pubsub-test/application-prod-consumer.yml
            echo "${{ secrets.PROD_APPLICATION_YML_PRODUCER }}" | base64 -d > /home/${{ secrets.EC2_USERNAME }}/pickcar-pubsub-test/application-prod-producer.yml
            
            docker compose -f docker-compose.pubsub.yml down
            docker compose -f docker-compose.pubsub.yml up -d