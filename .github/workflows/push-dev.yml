name: Build and Deploy Domain Service

on:
  workflow_dispatch:
#  push:
#    branches:
#      - dev

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      #gradlew 스크립트에 실행 권한을 줘서 Gradle 빌드 가능하도록 설정
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build domain JAR
        working-directory: ./domain
        run: ./gradlew clean build -x test

      - name: Copy JAR and docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DOMAIN_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          source: |
            domain/build/libs/domain-0.0.1-SNAPSHOT.jar
            docker/docker-compose.domain.yml
          target: /home/ec2-user/pickcar-domain/

      - name: SSH into EC2 and deploy with docker-compose
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DOMAIN_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_ACTIONS_KEY }}
          script: |
            cd /home/ec2-user/pickcar-domain
            # 필요시 .env 파일 생성/업데이트
            # echo "SPRING_DATASOURCE_URL=..." > .env
            docker-compose -f docker-compose.domain.yml down
            docker-compose -f docker-compose.domain.yml up -d --build