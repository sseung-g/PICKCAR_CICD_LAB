# 인증 기능 비활성화
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: pickcar_index_
        period: 24h

# 인메모리 log를 일정 주기마다 Long-trem storage에 전달하는 역할 (현재는 일반 filesystem -> s3로 전환 가능)
ingester:
  wal:      # Write-Ahead-Log (비정상 종료 시 데이터 손실 방지, 재시작 시 빠른 복구)
    enabled: true  # enables -> enabled로 수정
    dir: /loki/wal
  chunk_idle_period: 5m     # 청크가 5분뒤 디스크로 flush 됨 (log stream은 여러 개의 chunk로 구성되는데, 설정된 interval로  storage로 flush 될 수 있음)
  chunk_retain_period: 30s  # 청크 재로딩시 30초 유지
  max_chunk_age: 1h         # 청크당 최대 수명 (1시간)
  chunk_target_size: 1048576  # 청크 크기 - 1MB
  max_transfer_retries: 0

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index   # 로컬에서 인덱스를 생성하는 디렉토리 경로 (컨테이너 내 경로)
    cache_location: /loki/boltdb-cache    # 인덱스 조회 성능 향상을 위해 로컬에 캐시 저장 (컨테이너 내 경로)
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

limits_config:
  enforce_metric_name: false
  reject_old_samples: true
  reject_old_samples_max_age: 168h         # 7일
  max_entries_limit_per_query: 5000
  max_streams_per_user: 10000
  max_global_streams_per_user: 10000
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 15MB
  retention_period: 336h                  # 로그 보관 기간: 14일(336시간) 후 삭제

chunk_store_config:
  max_look_back_period: 336h  # 과거 조회 기간 제한없음

compactor:    # 인덱스 압축 및 정리 작업
  working_directory: /loki/compactor
  shared_store: filesystem
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# LogQL 실행을 담당하는 Write Components
querier:
  max_concurrent: 10
  query_timeout: 1m

analytics:
  reporting_enabled: false