version: '3.8'

services:
  pickcar-emulator-test:
    container_name: pickcar-emulator-test
    image: openjdk:21-jdk
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_RABBITMQ_HOST=${RABBITMQ_HOST}
      - SPRING_RABBITMQ_PORT=${RABBITMQ_PORT}
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - PINPOINT_AGENT_ID=${PINPOINT_AGENT_ID}
      - PINPOINT_APPLICATION_NAME=${PINPOINT_APPLICATION_NAME}
    ports:
      - "8087:8080"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /home/${EC2_USERNAME}/pickcar-sse-test/emulator-0.0.1-SNAPSHOT.jar:/app/app.jar
      - /home/${EC2_USERNAME}/pickcar-sse-test/logs:/app/logs
      - /pinpoint:/pinpoint
    working_dir: /app
    command: >
      java
      -javaagent:/pinpoint/pinpoint-agent-2.5.4/pinpoint-bootstrap.jar
      -Dpinpoint.agentId=${PINPOINT_AGENT_ID}
      -Dpinpoint.applicationName=${PINPOINT_APPLICATION_NAME}
      -Dpinpoint.config=/pinpoint/pinpoint-agent-2.5.4/pinpoint-root.config
      -Duser.timezone=Asia/Seoul
      -Dfile.encoding=UTF-8
      -jar app.jar --spring.profiles.active=prod
    networks:
      - pickcar-net-test

  redis:
    container_name: pickcar-redis-test
    image: redis:7
    ports:
      - "6378:6379"
    networks:
      - pickcar-net-test
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail-test
    ports:
      - "9085:9080"
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /home/${EC2_USERNAME}/pickcar-sse-test/promtail-config.yml:/etc/promtail/config.yml
      - /home/${EC2_USERNAME}/pickcar-sse-test/logs:/app/logs
      - /home/${EC2_USERNAME}/pickcar-sse-test/promtail:/var/log/promtail
    environment:
      - HOSTNAME=${HOSTNAME:-$(hostname)}
      - EC2_INSTANCE_ID=${EC2_INSTANCE_ID:-unknown}
    networks:
      - pickcar-net-test
    restart: unless-stopped
    depends_on:
      - pickcar-emulator-test

volumes:
  mysql-data:
    name: mysql-data

networks:
  pickcar-net-test:
    name: pickcar-net-test
