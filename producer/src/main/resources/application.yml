spring:
  application:
    name: pickcar-producer
  profiles:
    active: local

logging:
  moduleName: producer
  sensitiveFieldRules:
    - path: "none"
      fields: ["none"]

mq:
  cycle:
    queue: cycle-queue
    exchange: exchange-cycle
    routing-key: cycle.key
  event:
    queue: event-queue
    exchange: exchange-event
    routing-key: event.key